name: ARISTA MATRIX PIPELINE

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: arista-matrix
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: 1

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if already running
        id: check
        run: |
          RUNNING=false
          if curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
             "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=in_progress&branch=${{ github.ref_name }}" \
             | grep -q "\"id\":"; then
            RUNNING=true
          fi
          echo "should_run=$([ "$RUNNING" = false ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "Running check: $RUNNING"

  prepare:
    needs: check-and-run
    if: needs.check-and-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore Rolling State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: Prepare Bank
        run: |
          mkdir -p output
          if [ ! -s output/ip_bank.txt ]; then
            python downloader.py
          fi
          if [ ! -s output/clean_ips.txt ]; then
            python cleaner.py
          fi
      - name: Compact Cache
        run: |
          python -c "from cache import compact_cache_files; compact_cache_files()"
      - name: Clean Temp Files
        run: |
          rm -f output/tcp_live.txt output/tls_live.txt output/https_live.txt
          rm -f output/fingerprint_results.txt output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
          rm -f output/scanned_cache.txt
      - name: Save Rolling State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  tcp:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: TCP Scan
        run: python main.py --tcp
      - name: Clean TCP Files
        run: |
          rm -f output/fingerprint_results.txt output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
      - name: Save TCP State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/tcp_live.txt
            output/scanned_cache.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  tls:
    needs: tcp
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: TLS Scan
        run: python main.py --tls
      - name: Clean TLS Files
        run: |
          rm -f output/tcp_live.txt
          rm -f output/fingerprint_results.txt output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
      - name: Save TLS State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/tls_live.txt
            output/scanned_cache.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  https:
    needs: tls
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: HTTPS Validation
        run: python main.py --https
      - name: Clean HTTPS Files
        run: |
          rm -f output/tcp_live.txt output/tls_live.txt
          rm -f output/fingerprint_results.txt output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
      - name: Save HTTPS State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/https_live.txt
            output/https_meta.json
            output/scanned_cache.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  fingerprint:
    needs: https
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: Fingerprint
        run: python main.py --fp
      - name: Clean Fingerprint Files
        run: |
          rm -f output/tcp_live.txt output/tls_live.txt output/https_live.txt
          rm -f output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
      - name: Save Fingerprint State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/fingerprint_results.txt
            output/https_meta.json
            output/scanned_cache.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  geo:
    needs: fingerprint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: GEO
        run: python main.py --geo
      - name: Clean GEO Files
        run: |
          rm -f output/tcp_live.txt output/tls_live.txt output/https_live.txt
          rm -f output/fingerprint_results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
      - name: Save GEO State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/results.txt
            output/https_meta.json
            output/scanned_cache.txt
            output/geo_cache.json
            output/best_ips.txt
          overwrite: true
          retention-days: 3

  finalize:
    needs: geo
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore State
        uses: actions/download-artifact@v4
        with:
          name: arista-output
          path: output
        continue-on-error: true
      - name: Finalize
        run: python main.py --finalize
      - name: Clean Final Files
        run: |
          rm -f output/tcp_live.txt output/tls_live.txt output/https_live.txt
          rm -f output/fingerprint_results.txt output/results.txt
          rm -f output/domains_raw.txt output/domains.txt output/live_bank.txt
          rm -f output/scanned_cache.txt
      - name: Save Final State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: |
            output/ip_bank.txt
            output/clean_ips.txt
            output/scan_cursor.txt
            output/current_part.txt
            output/geo_cache.json
            output/best_ips.txt
            output/domains.txt
          overwrite: true
          retention-days: 3
      - name: Commit Final Output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output

          git add output/best_ips.txt output/scan_cursor.txt 2>/dev/null || true
          git add output/current_part.txt output/geo_cache.json 2>/dev/null || true
          git add output/domains.txt 2>/dev/null || true

          if [ -f output/live_bank.txt ] && [ -f output/ip_bank.txt ]; then
            cat output/live_bank.txt >> output/ip_bank.txt
            sort -u -o output/ip_bank.txt output/ip_bank.txt
            git add output/ip_bank.txt
          fi

          if ! git diff --cached --quiet; then
            git commit -m "ARISTA $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:main
          fi
