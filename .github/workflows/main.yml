name: V18.2 STABLE SCANNER

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install aiohttp

      - name: run shard
        env:
          SHARD_ID: ${{ matrix.shard }}
        run: python pipeline.py

      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: output/

  merge:
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: output/

      - run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: global
          path: output/global_best.txt

      - name: Commit and push output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/global_best.txt || true
          git commit -m "Update IP list [skip ci]" || true
          git push || true
